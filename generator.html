<!DOCTYPE html>
<html>
<head>
<title>Pinterest Pin Generator</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
}
canvas{
    border:2px solid #ddd;
    margin-top:20px;
}
input{
    padding:10px;
    width:300px;
    margin:5px;
}
button{
    padding:12px 20px;
    background:#e60023;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>📌 AI Pinterest Pin Generator</h1>

<input id="title" placeholder="Pin Title"><br>
<input id="subtitle" placeholder="Subtitle"><br>
<input id="imgurl" placeholder="Background Image URL"><br>

<button onclick="generatePin()">Generate Pin</button>

<br>
<canvas id="canvas" width="1000" height="1500"></canvas>
<br>
<button onclick="downloadPin()">Download Pin</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function generatePin(){
    const title = document.getElementById("title").value;
    const subtitle = document.getElementById("subtitle").value;
    const imgurl = document.getElementById("imgurl").value;

    const img = new Image();
    img.crossOrigin="anonymous";
    img.src = imgurl;

    img.onload = function(){
        ctx.drawImage(img,0,0,1000,1500);

        // dark overlay
        ctx.fillStyle="rgba(0,0,0,0.35)";
        ctx.fillRect(0,0,1000,1500);

        // Title
        ctx.fillStyle="white";
        ctx.font="bold 80px Arial";
        ctx.textAlign="center";
        wrapText(title,500,400,800,90);

        // Subtitle
        ctx.font="40px Arial";
        wrapText(subtitle,500,800,700,50);
    }
}

function wrapText(text,x,y,maxWidth,lineHeight){
    const words = text.split(' ');
    let line='';
    for(let n=0;n<words.length;n++){
        const testLine=line+words[n]+' ';
        const metrics=ctx.measureText(testLine);
        const testWidth=metrics.width;
        if(testWidth>maxWidth && n>0){
            ctx.fillText(line,x,y);
            line=words[n]+' ';
            y+=lineHeight;
        } else {
            line=testLine;
        }
    }
    ctx.fillText(line,x,y);
}

function downloadPin(){
    const link=document.createElement('a');
    link.download='pinterest-pin.png';
    link.href=canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
