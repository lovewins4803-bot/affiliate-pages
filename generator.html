<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN AI FACTORY v6 NO API PRO</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
padding:20px;
}

h1{font-size:24px}

input{
width:92%;
padding:12px;
margin:6px;
border-radius:10px;
border:none;
}

button{
width:92%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
background:linear-gradient(135deg,#ff2d55,#7c3aed);
color:white;
cursor:pointer;
}

textarea{
width:92%;
height:180px;
margin-top:10px;
border-radius:10px;
border:none;
padding:10px;
}
</style>
</head>

<body>

<h1>🚀 PIN AI FACTORY v6 (NO API PRO)</h1>

<input id="keyword" placeholder="Niche (e.g Kitchen Gadgets)">
<input id="link" placeholder="Affiliate Link">

<button onclick="generatePack()">✨ Generate Full Pin Pack</button>

<textarea id="output" placeholder="Your Pinterest post pack appears here..."></textarea>

<button onclick="copy()">📋 Copy Pinterest Post</button>

<script>

function generatePack(){

let k=document.getElementById("keyword").value;
let link=document.getElementById("link").value;

let titles=[
`🔥 Best ${k} You Must Try`,
`Trending ${k} on Amazon`,
`Must Have ${k} 2026`,
`Viral ${k} Everyone Buys`,
`Top Rated ${k} Right Now`
];

let title=titles[Math.floor(Math.random()*titles.length)];

let desc=`Discover the best ${k} available right now. Highly rated and trending products you don’t want to miss.`;

let hashtags=`#${k.replace(/ /g,'')} #AmazonFinds #TikTokMadeMeBuyIt #PinterestFinds #ViralProducts`;

let pinterestPost=`
TITLE:
${title}

DESCRIPTION:
${desc}

LINK:
${link}

HASHTAGS:
${hashtags}

PIN IDEA:
Clean luxury Pinterest style image with bold text overlay and soft background.
`;

document.getElementById("output").value=pinterestPost;
}

function copy(){
let o=document.getElementById("output");
o.select();
document.execCommand("copy");
alert("Copied!");
}

</script>

</body>
</html>
