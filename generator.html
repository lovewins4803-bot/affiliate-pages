<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN AI FACTORY v8 HISTORY</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
padding:20px;
text-align:center;
}

h1{font-size:22px}

input{
width:92%;
padding:12px;
margin:6px;
border-radius:10px;
border:none;
}

button{
width:92%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
background:linear-gradient(135deg,#ff2d55,#7c3aed);
color:white;
cursor:pointer;
}

.card{
background:#111827;
margin-top:12px;
padding:12px;
border-radius:10px;
text-align:left;
}
.small-btn{
width:100%;
margin-top:8px;
padding:8px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
}
.danger{
background:#ef4444;
}
</style>
</head>

<body>

<h1>🚀 PIN AI FACTORY v8 HISTORY MODE</h1>

<input id="keyword" placeholder="Niche (e.g Kitchen Gadgets)">
<input id="link" placeholder="Affiliate Link">

<button onclick="generate()">✨ Generate Pin</button>
<button onclick="clearAll()" class="danger">🗑 Clear History</button>

<div id="output"></div>

<script>

let history = JSON.parse(localStorage.getItem("pins") || "[]");

render();

function generate(){

let k=document.getElementById("keyword").value;
let link=document.getElementById("link").value;

let pin={
title:`🔥 Best ${k}`,
desc:`Trending ${k} you should try`,
link:link,
time:new Date().toLocaleString()
};

history.unshift(pin);
localStorage.setItem("pins",JSON.stringify(history));

render();
}

function render(){

let container=document.getElementById("output");
container.innerHTML="";

history.forEach((p,i)=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<b>${p.title}</b><br><br>
${p.desc}<br><br>
${p.link}<br><br>
<small>${p.time}</small><br>

<button class="small-btn" onclick="copy('${p.title} | ${p.desc} | ${p.link}')">
📋 Copy
</button>

<button class="small-btn danger" onclick="removePin(${i})">
🗑 Delete
</button>
`;

container.appendChild(card);
});

}

function copy(text){
navigator.clipboard.writeText(text);
alert("Copied!");
}

function removePin(i){
history.splice(i,1);
localStorage.setItem("pins",JSON.stringify(history));
render();
}

function clearAll(){
history=[];
localStorage.removeItem("pins");
render();
}

</script>

</body>
</html>
