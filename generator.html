<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN AI FACTORY v5</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
padding:20px;
}

h1{font-size:26px}

input{
width:92%;
padding:12px;
margin:6px;
border-radius:10px;
border:none;
}

button{
width:92%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
background:linear-gradient(135deg,#ff2d55,#7c3aed);
color:white;
cursor:pointer;
}

canvas{
margin-top:15px;
max-width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🚀 PIN AI FACTORY v5 (PRO MONEY MODE)</h1>

<input id="keyword" placeholder="Niche (e.g Kitchen Gadgets)">
<input id="link" placeholder="Affiliate Link">

<button onclick="generate()">✨ Generate Money Pins</button>

<canvas id="canvas" width="1000" height="1500"></canvas>

<button onclick="downloadPin()">⬇ Download Current Pin</button>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let pins=[];
let index=0;

/* ---------------- GENERATE PINS ---------------- */
function generate(){

let k=document.getElementById("keyword").value;
let link=document.getElementById("link").value;

pins=[];

for(let i=0;i<10;i++){

pins.push({
title:`🔥 Best ${k} You Must Try`,
desc:`Check Price Now → Limited Offer 🔥`,
cta:`${link}`
});

}

index=0;
draw(index);
}

/* ---------------- DRAW PIN ---------------- */
function draw(i){

ctx.clearRect(0,0,1000,1500);

ctx.fillStyle="rgba(0,0,0,0.45)";
ctx.fillRect(0,0,1000,1500);

ctx.fillStyle="white";
ctx.font="bold 80px Arial";
ctx.textAlign="center";

wrap(pins[i].title,500,500,850,90);

ctx.font="40px Arial";
ctx.fillText(pins[i].desc,500,850);

ctx.font="30px Arial";
ctx.fillStyle="#22c55e";
ctx.fillText("👉 " + pins[i].cta,500,1000);
}

/* ---------------- TEXT WRAP ---------------- */
function wrap(text,x,y,maxWidth,lineHeight){
let words=text.split(" ");
let line="";

for(let i=0;i<words.length;i++){
let test=line+words[i]+" ";
if(ctx.measureText(test).width>maxWidth && i>0){
ctx.fillText(line,x,y);
line=words[i]+" ";
y+=lineHeight;
}else{
line=test;
}
}
ctx.fillText(line,x,y);
}

/* ---------------- DOWNLOAD ---------------- */
function downloadPin(){

let a=document.createElement("a");
a.download="pin.png";
a.href=canvas.toDataURL();
a.click();
}

</script>

</body>
</html>
