<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN AI FACTORY v3</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#0b1220;
color:white;
padding:20px;
}

h1{font-size:28px;margin-bottom:10px}

input,select{
width:90%;
padding:12px;
margin:6px;
border-radius:10px;
border:none;
}

button{
width:92%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(135deg,#ff2d55,#7c3aed);
color:white;
}

canvas{
margin-top:20px;
max-width:100%;
border-radius:12px;
}
</style>
</head>

<body>

<h1>🚀 PIN AI FACTORY v3</h1>

<!-- AI INPUT -->
<input id="keyword" placeholder="Enter niche (e.g Kitchen Gadgets)">
<button onclick="generateAI()">✨ Generate AI Text</button>

<!-- MANUAL OVERRIDE -->
<input id="title" placeholder="Pin Title">
<input id="subtitle" placeholder="Subtitle">

<!-- IMAGE -->
<input id="imgurl" placeholder="Background Image URL">

<!-- TEMPLATE -->
<select id="template">
<option value="dark">Dark Luxury</option>
<option value="light">Clean White</option>
<option value="gradient">Gradient Glow</option>
<option value="pinterest">Pinterest Red Style</option>
<option value="minimal">Minimal Soft</option>
</select>

<button onclick="generatePin()">📌 Generate Pin</button>

<canvas id="canvas" width="1000" height="1500"></canvas>

<button onclick="downloadPin()">⬇ Download Pin</button>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

/* ---------------- AI TEXT GENERATOR ---------------- */
function generateAI(){

let k=document.getElementById("keyword").value;

const titles=[
"Best "+k+" You Need in 2026",
"Trending "+k+" on Amazon",
"Must Have "+k,
"Viral "+k+" Everyone Buys",
"Top Rated "+k,
"Smart "+k+" That Change Life"
];

const subs=[
"Save Time & Money",
"Going Viral on Pinterest",
"Amazon Best Seller",
"Limited Stock Alert",
"Highly Recommended",
"Customer Favorite"
];

document.getElementById("title").value =
titles[Math.floor(Math.random()*titles.length)];

document.getElementById("subtitle").value =
subs[Math.floor(Math.random()*subs.length)];
}

/* ---------------- PIN GENERATOR ---------------- */
function generatePin(){

const title=document.getElementById("title").value;
const subtitle=document.getElementById("subtitle").value;
const imgurl=document.getElementById("imgurl").value;
const template=document.getElementById("template").value;

const img=new Image();
img.crossOrigin="anonymous";
img.src=imgurl;

img.onload=function(){

// BACKGROUND
ctx.drawImage(img,0,0,1000,1500);

// TEMPLATES
if(template==="dark"){
ctx.fillStyle="rgba(0,0,0,0.45)";
ctx.fillRect(0,0,1000,1500);
}

if(template==="light"){
ctx.fillStyle="rgba(255,255,255,0.3)";
ctx.fillRect(0,0,1000,1500);
}

if(template==="gradient"){
let g=ctx.createLinearGradient(0,0,1000,1500);
g.addColorStop(0,"rgba(124,58,237,0.5)");
g.addColorStop(1,"rgba(236,72,153,0.5)");
ctx.fillStyle=g;
ctx.fillRect(0,0,1000,1500);
}

if(template==="pinterest"){
ctx.fillStyle="rgba(230,0,35,0.35)";
ctx.fillRect(0,0,1000,1500);
}

if(template==="minimal"){
ctx.fillStyle="rgba(255,255,255,0.2)";
ctx.fillRect(0,0,1000,1500);
}

/* TITLE */
ctx.fillStyle="white";
ctx.font="bold 70px Arial";
ctx.textAlign="center";
wrapText(title,500,400,850,80);

/* SUBTITLE */
ctx.font="40px Arial";
wrapText(subtitle,500,800,800,60);

};
}

/* TEXT WRAP */
function wrapText(text,x,y,maxWidth,lineHeight){
let words=text.split(" ");
let line="";

for(let i=0;i<words.length;i++){
let test=line+words[i]+" ";
let width=ctx.measureText(test).width;

if(width>maxWidth && i>0){
ctx.fillText(line,x,y);
line=words[i]+" ";
y+=lineHeight;
}else{
line=test;
}
}
ctx.fillText(line,x,y);
}

/* DOWNLOAD */
function downloadPin(){
let link=document.createElement("a");
link.download="pin.png";
link.href=canvas.toDataURL();
link.click();
}

</script>

</body>
</html>
