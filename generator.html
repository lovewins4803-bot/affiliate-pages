<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN AI FACTORY v7 DASHBOARD</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
padding:20px;
text-align:center;
}

h1{font-size:24px}

input{
width:92%;
padding:12px;
margin:6px;
border-radius:10px;
border:none;
}

button{
width:92%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
background:linear-gradient(135deg,#ff2d55,#7c3aed);
color:white;
cursor:pointer;
}

.card{
background:#111827;
margin-top:15px;
padding:15px;
border-radius:12px;
text-align:left;
}

.small-btn{
padding:8px;
margin-top:8px;
width:100%;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
}
</style>
</head>

<body>

<h1>🚀 PIN AI FACTORY v7 DASHBOARD</h1>

<input id="keyword" placeholder="Niche (e.g Kitchen Gadgets)">
<input id="link" placeholder="Affiliate Link">

<button onclick="generate()">✨ Generate 10 Pin Cards</button>

<div id="output"></div>

<script>

function generate(){

let k=document.getElementById("keyword").value;
let link=document.getElementById("link").value;

let container=document.getElementById("output");
container.innerHTML="";

for(let i=0;i<10;i++){

let title=`🔥 Best ${k} #${i+1}`;
let desc=`Top trending ${k} you must check out. Limited time deals available now.`;
let hashtags=`#${k.replace(/ /g,'')} #AmazonFinds #Viral`;

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<b>Title:</b> ${title}<br><br>
<b>Description:</b> ${desc}<br><br>
<b>Link:</b> ${link}<br><br>
<b>Hashtags:</b> ${hashtags}<br><br>

<button class="small-btn" onclick="copyText('${title} | ${desc} | ${link} | ${hashtags}')">
📋 Copy This Pin
</button>
`;

container.appendChild(card);
}

}

function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied!");
}

</script>

</body>
</html>
