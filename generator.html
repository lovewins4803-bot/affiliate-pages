<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN AI FACTORY PRO v4</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
padding:20px;
}

h1{font-size:28px}

input,select{
width:92%;
padding:12px;
margin:6px;
border-radius:10px;
border:none;
}

button{
width:92%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
background:linear-gradient(135deg,#ff2d55,#7c3aed);
color:white;
cursor:pointer;
}

canvas{
margin-top:15px;
max-width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🚀 PIN AI FACTORY PRO v4</h1>

<input id="keyword" placeholder="Niche (e.g Kitchen Gadgets)">
<input id="link" placeholder="Affiliate Link">

<button onclick="generateAI()">✨ Generate 10 Viral Pins</button>

<canvas id="canvas" width="1000" height="1500"></canvas>

<button onclick="downloadAll()">⬇ Download Pin</button>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let currentPins=[];

/* ---------------- AI BULK GENERATOR ---------------- */
function generateAI(){

let k=document.getElementById("keyword").value;

currentPins=[];

for(let i=0;i<10;i++){

currentPins.push({
title:[
"Best "+k+" You Need Now",
"Top Trending "+k,
"Must Have "+k+" 2026",
"Viral "+k+" on Amazon",
"Hidden Gem "+k,
"Smart "+k+" Upgrade",
"Cheap "+k+" That Works",
"Luxury "+k+" Pick",
"Amazon Bestseller "+k,
"Game Changing "+k
][i],

subtitle:[
"Save Time & Money",
"Going Viral Today",
"Limited Offer",
"Highly Rated",
"Best Choice",
"Top Reviewed",
"Customer Favorite",
"Hot Deal",
"Must Buy",
"Fast Selling"
][i],

template:["dark","gradient","pinterest","minimal","light"][i%5]
});

}

renderPin(0);
}

/* ---------------- RENDER PIN ---------------- */
function renderPin(i){

let pin=currentPins[i];

ctx.clearRect(0,0,1000,1500);

ctx.fillStyle="rgba(0,0,0,0.4)";
ctx.fillRect(0,0,1000,1500);

ctx.fillStyle="white";
ctx.font="bold 70px Arial";
ctx.textAlign="center";

wrap(pin.title,500,400,850,80);

ctx.font="40px Arial";
wrap(pin.subtitle,500,800,800,60);
}

/* ---------------- TEXT WRAP ---------------- */
function wrap(text,x,y,maxWidth,lineHeight){
let words=text.split(" ");
let line="";

for(let i=0;i<words.length;i++){
let test=line+words[i]+" ";
if(ctx.measureText(test).width>maxWidth && i>0){
ctx.fillText(line,x,y);
line=words[i]+" ";
y+=lineHeight;
}else{
line=test;
}
}
ctx.fillText(line,x,y);
}

/* ---------------- DOWNLOAD ---------------- */
function downloadAll(){

let link=document.createElement("a");
link.download="pin.png";
link.href=canvas.toDataURL();
link.click();

alert("Pin downloaded!");
}

</script>

</body>
</html>
