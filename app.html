<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Landing Page Converter</title>

<style>
body{
font-family:Arial;
background:#020617;
color:white;
padding:20px;
max-width:900px;
margin:auto;
}

h1{font-size:28px}

textarea{
width:100%;
min-height:220px;
margin-top:15px;
padding:15px;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#4f46e5;
color:white;
}

.output{
min-height:450px;
background:black;
font-family:monospace;
}
</style>
</head>

<body>

<h1>🤖 Smart Paste → Landing Page Generator</h1>

<textarea id="inputText" placeholder="Paste copied product page / Amazon description / blog post..."></textarea>

<button onclick="pasteClipboard()">📥 Paste from clipboard</button>
<button onclick="convert()">⚡ Generate Landing Page</button>

<h2>Generated HTML</h2>
<textarea id="outputText" class="output"></textarea>
<button onclick="copyHTML()">📋 Copy HTML</button>

<script>

async function pasteClipboard(){
try{
const text = await navigator.clipboard.readText();
document.getElementById("inputText").value = text;
}catch{
alert("Clipboard blocked. Paste manually.");
}
}

function convert(){

let raw = document.getElementById("inputText").value;

if(raw.trim()==""){
alert("Paste content first!");
return;
}

let lines = raw.split("\n").filter(l=>l.trim()!="");

let title = lines[0];
let paragraphs = lines.slice(1,6).join("</p><p>");

let bullets = "";
if(lines.length>6){
bullets = "<ul>";
for(let i=6;i<lines.length;i++){
bullets += "<li>"+lines[i]+"</li>";
}
bullets += "</ul>";
}

const html = `
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${title}</title>

<style>
body{font-family:Arial;padding:30px;max-width:800px;margin:auto;line-height:1.7;background:#f8fafc}
h1{font-size:40px}
.cta{background:black;color:white;padding:18px 30px;text-decoration:none;border-radius:12px;font-weight:bold}
section{margin:40px 0}
</style>
</head>

<body>

<h1>${title}</h1>

<section>
<p>${paragraphs}</p>
</section>

<section>
<h2>Key Benefits</h2>
${bullets}
</section>

<section>
<a class="cta" href="#">🛒 Check Price Now</a>
</section>

<p style="margin-top:40px;font-size:13px;color:gray">
As an affiliate, we may earn from qualifying purchases.
</p>

</body>
</html>
`;

document.getElementById("outputText").value = html;
}

function copyHTML(){
let out=document.getElementById("outputText");
out.select();
document.execCommand("copy");
alert("Landing page copied!");
}
</script>

</body>
</html>
